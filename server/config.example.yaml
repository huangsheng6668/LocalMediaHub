server:
  host: "0.0.0.0"
  port: 8000

scan:
  video_extensions:
    - ".mp4"
    - ".mkv"
    - ".avi"
    - ".mov"
    - ".wmv"
    - ".flv"
    - ".ts"
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".bmp"
    - ".webp"

thumbnail:
  cache_dir: ".cache/thumbnails"
  max_size: 300
  format: "JPEG"

# System browse: restrict which directories are visible to the Android client.
# If omitted or empty, /api/v1/system/* browsing is disabled.
system:
  allowed_roots:
    - "/usr/media/path"
